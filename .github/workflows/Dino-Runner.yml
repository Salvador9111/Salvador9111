name: Generate README Games

# When to run this workflow
on:
  # Run every 6 hours (keeps animations fresh)
  schedule:
    - cron: "0 */6 * * *"
  
  # Allow manual trigger from Actions tab
  workflow_dispatch:
  
  # Run on every push to main branch
  push:
    branches:
      - main

# Permissions needed to write files back to repo
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout your repository code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Create assets directory if it doesn't exist
      - name: Ensure Assets Directory
        run: mkdir -p assets

      # 3. Generate Dino Runner SVG (self-contained animated SVG)
      - name: Generate Dino Runner Game
        run: |
          cat > assets/dino-runner.svg << 'EOF'
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%">
            <defs>
              <style>
                .bg { fill: #0d1117; }
                .ground { fill: #30363d; }
                .star { fill: #ffffff; }
                .dino-body { fill: #3fb950; }
                .dino-eye { fill: #0d1117; }
                .cactus { fill: #238636; }
                .cactus-fg { fill: #2ea043; }
                .bird { fill: #f0883e; }
                .bird-wing { fill: #da3633; }
                .cloud { fill: #8b949e; opacity: 0.3; }
                .score { fill: #c9d1d9; font-family: 'Courier New', monospace; font-size: 16px; font-weight: bold; }
                .title { fill: #f0f6fc; font-family: 'Segoe UI', Arial; sans-serif; font-size: 16px; font-weight: 600; }
                .hi { fill: #8b949e; font-family: 'Courier New', monospace; font-size: 12px; }
                
                @keyframes jump {
                  0%, 100% { transform: translateY(0); }
                  50% { transform: translateY(-60px); }
                }
                @keyframes leg1 {
                  0%, 100% { transform: translateY(0); }
                  50% { transform: translateY(-3px); }
                }
                @keyframes leg2 {
                  0%, 100% { transform: translateY(-3px); }
                  50% { transform: translateY(0); }
                }
                @keyframes scroll {
                  0% { transform: translateX(850px); }
                  100% { transform: translateX(-100px); }
                }
                @keyframes wing {
                  0%, 100% { transform: translateY(0); }
                  50% { transform: translateY(-5px); }
                }
              </style>
            </defs>
            
            <rect class="bg" width="100%" height="100%" rx="8"/>
            
            <text x="20" y="28" class="title">🦖 Dino Runner</text>
            <text x="780" y="28" class="score" text-anchor="end">01337</text>
            <text x="780" y="44" class="hi" text-anchor="end">HI 09999</text>
            
            <g opacity="0.6">
              <circle class="star" cx="100" cy="60" r="1">
                <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
              </circle>
              <circle class="star" cx="300" cy="80" r="1.2">
                <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
              </circle>
              <circle class="star" cx="500" cy="50" r="1">
                <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
              </circle>
              <circle class="star" cx="700" cy="70" r="1.5">
                <animate attributeName="opacity" values="0.3;1;0.3" dur="4s" repeatCount="indefinite"/>
              </circle>
            </g>
            
            <g class="cloud" style="animation: scroll 20s linear infinite;">
              <rect x="50" y="50" width="40" height="8" rx="4"/>
              <rect x="60" y="42" width="30" height="8" rx="4"/>
              <rect x="70" y="34" width="20" height="8" rx="4"/>
            </g>
            <g class="cloud" style="animation: scroll 25s linear infinite; animation-delay: 5s;">
              <rect x="200" y="70" width="50" height="8" rx="4"/>
              <rect x="210" y="62" width="35" height="8" rx="4"/>
              <rect x="220" y="54" width="20" height="8" rx="4"/>
            </g>
            <g class="cloud" style="animation: scroll 18s linear infinite; animation-delay: 10s;">
              <rect x="400" y="45" width="35" height="8" rx="4"/>
              <rect x="410" y="37" width="25" height="8" rx="4"/>
            </g>
            
            <rect class="ground" x="0" y="190" width="800" height="2"/>
            <rect class="ground" x="0" y="220" width="800" height="2"/>
            
            <g style="animation: scroll 3s linear infinite;">
              <rect x="0" y="190" width="20" height="2" fill="#484f58"/>
              <rect x="40" y="190" width="10" height="2" fill="#484f58"/>
              <rect x="80" y="190" width="15" height="2" fill="#484f58"/>
              <rect x="120" y="190" width="8" height="2" fill="#484f58"/>
              <rect x="160" y="190" width="20" height="2" fill="#484f58"/>
              <rect x="200" y="190" width="12" height="2" fill="#484f58"/>
              <rect x="240" y="190" width="18" height="2" fill="#484f58"/>
              <rect x="280" y="190" width="6" height="2" fill="#484f58"/>
              <rect x="320" y="190" width="22" height="2" fill="#484f58"/>
              <rect x="360" y="190" width="14" height="2" fill="#484f58"/>
              <rect x="400" y="190" width="16" height="2" fill="#484f58"/>
              <rect x="440" y="190" width="10" height="2" fill="#484f58"/>
              <rect x="480" y="190" width="20" height="2" fill="#484f58"/>
              <rect x="520" y="190" width="8" height="2" fill="#484f58"/>
              <rect x="560" y="190" width="15" height="2" fill="#484f58"/>
              <rect x="600" y="190" width="12" height="2" fill="#484f58"/>
              <rect x="640" y="190" width="18" height="2" fill="#484f58"/>
              <rect x="680" y="190" width="10" height="2" fill="#484f58"/>
              <rect x="720" y="190" width="20" height="2" fill="#484f58"/>
              <rect x="760" y="190" width="14" height="2" fill="#484f58"/>
              <rect x="800" y="190" width="16" height="2" fill="#484f58"/>
            </g>
            
            <g transform="translate(100, 150)">
              <g style="animation: jump 1.5s ease-in-out infinite;">
                <polygon class="dino-body" points="-10,10 -20,5 -15,15"/>
                <rect class="dino-body" x="0" y="0" width="30" height="25" rx="4"/>
                <rect class="dino-body" x="25" y="5" width="15" height="15" rx="3"/>
                <rect class="dino-body" x="35" y="-5" width="20" height="18" rx="3"/>
                <rect class="dino-body" x="50" y="0" width="8" height="8" rx="2"/>
                <rect class="dino-eye" x="42" y="0" width="3" height="3" rx="1">
                  <animate attributeName="opacity" values="1;0;1" dur="4s" repeatCount="indefinite"/>
                </rect>
                <rect class="dino-body" x="5" y="22" width="8" height="12" rx="2" style="animation: leg1 0.3s infinite;"/>
                <rect class="dino-body" x="5" y="32" width="8" height="4" rx="2" style="animation: leg1 0.3s infinite;"/>
                <rect class="dino-body" x="18" y="22" width="8" height="12" rx="2" style="animation: leg2 0.3s infinite;"/>
                <rect class="dino-body" x="18" y="32" width="8" height="4" rx="2" style="animation: leg2 0.3s infinite;"/>
                <rect class="dino-body" x="28" y="12" width="10" height="4" rx="2" style="animation: leg1 0.3s infinite;"/>
              </g>
            </g>
            
            <g style="animation: scroll 4s linear infinite;">
              <g transform="translate(0, 160)">
                <rect class="cactus" x="0" y="0" width="10" height="30" rx="2"/>
                <rect class="cactus" x="-8" y="5" width="8" height="4" rx="2"/>
                <rect class="cactus" x="-8" y="5" width="4" height="12" rx="2"/>
                <rect class="cactus" x="10" y="8" width="8" height="4" rx="2"/>
                <rect class="cactus" x="14" y="8" width="4" height="10" rx="2"/>
                <rect class="cactus-fg" x="2" y="2" width="2" height="20" rx="1"/>
              </g>
            </g>
            
            <g style="animation: scroll 3.5s linear infinite; animation-delay: 2s;">
              <g transform="translate(0, 170)">
                <rect class="cactus" x="0" y="0" width="8" height="20" rx="2"/>
                <rect class="cactus" x="-6" y="5" width="6" height="3" rx="1.5"/>
                <rect class="cactus" x="-6" y="5" width="3" height="8" rx="1.5"/>
                <rect class="cactus-fg" x="1.5" y="2" width="2" height="14" rx="1"/>
              </g>
            </g>
            
            <g style="animation: scroll 5s linear infinite; animation-delay: 1s;">
              <g transform="translate(0, 155)">
                <rect class="cactus" x="0" y="0" width="10" height="35" rx="2"/>
                <rect class="cactus" x="-8" y="8" width="8" height="4" rx="2"/>
                <rect class="cactus" x="-8" y="8" width="4" height="15" rx="2"/>
                <rect class="cactus" x="10" y="5" width="8" height="4" rx="2"/>
                <rect class="cactus" x="14" y="5" width="4" height="18" rx="2"/>
                <rect class="cactus-fg" x="2" y="2" width="2" height="25" rx="1"/>
              </g>
            </g>
            
            <g style="animation: scroll 6s linear infinite; animation-delay: 3s;">
              <g transform="translate(0, 110)">
                <ellipse class="bird" cx="10" cy="5" rx="12" ry="6"/>
                <circle class="bird" cx="18" cy="3" r="4"/>
                <circle fill="#ffffff" cx="19" cy="2" r="1.5"/>
                <polygon class="bird-wing" points="2,2 10,-2 18,2" style="animation: wing 0.4s infinite;"/>
                <polygon class="bird-wing" points="5,6 12,10 18,6" style="animation: wing 0.4s infinite; animation-delay: 0.2s;"/>
                <rect x="14" y="5" width="8" height="2" fill="#f0883e"/>
              </g>
            </g>
            
            <g opacity="0.3">
              <rect x="200" y="130" width="30" height="2" fill="#ffffff" style="animation: scroll 1s linear infinite;"/>
              <rect x="400" y="100" width="20" height="2" fill="#ffffff" style="animation: scroll 0.8s linear infinite; animation-delay: 0.3s;"/>
              <rect x="600" y="140" width="25" height="2" fill="#ffffff" style="animation: scroll 1.2s linear infinite; animation-delay: 0.6s;"/>
            </g>
            
            <text x="400" y="240" class="hi" text-anchor="middle" fill="#484f58" font-size="11">PRESS SPACE TO JUMP</text>
          </svg>
          EOF

      # 4. Generate Tetris SVG
      - name: Generate Tetris Game
        run: |
          cat > assets/tetris.svg << 'EOF'
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 420" width="100%">
            <defs>
              <style>
                .bg { fill: #0d1117; }
                .block-i { fill: #00f0f0; stroke: #0d1117; stroke-width: 2; }
                .block-o { fill: #f0f000; stroke: #0d1117; stroke-width: 2; }
                .block-t { fill: #a000f0; stroke: #0d1117; stroke-width: 2; }
                .block-s { fill: #00f000; stroke: #0d1117; stroke-width: 2; }
                .block-z { fill: #f00000; stroke: #0d1117; stroke-width: 2; }
                .block-j { fill: #0000f0; stroke: #0d1117; stroke-width: 2; }
                .block-l { fill: #f0a000; stroke: #0d1117; stroke-width: 2; }
                .score { fill: #c9d1d9; font-family: 'Courier New', monospace; font-size: 14px; font-weight: bold; }
                .title { fill: #f0f6fc; font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; font-weight: 600; }
                .flash { fill: #ffffff; opacity: 0; }
                
                @keyframes fall1 { 0% { transform: translateY(-60px); } 100% { transform: translateY(300px); } }
                @keyframes fall2 { 0% { transform: translateY(-60px); } 100% { transform: translateY(240px); } }
                @keyframes fall3 { 0% { transform: translateY(-60px); } 100% { transform: translateY(180px); } }
                @keyframes fall4 { 0% { transform: translateY(-60px); } 100% { transform: translateY(360px); } }
                @keyframes flash { 0%, 100% { opacity: 0; } 50% { opacity: 0.8; } }
              </style>
            </defs>
            
            <rect class="bg" width="100%" height="100%" rx="8"/>
            
            <text x="20" y="28" class="title">🧱 Tetris</text>
            <text x="230" y="28" class="score" text-anchor="end">NEXT</text>
            
            <rect x="20" y="40" width="160" height="320" fill="#161b22" stroke="#30363d" stroke-width="2" rx="4"/>
            
            <g stroke="#21262d" stroke-width="1">
              <line x1="20" y1="80" x2="180" y2="80"/>
              <line x1="20" y1="120" x2="180" y2="120"/>
              <line x1="20" y1="160" x2="180" y2="160"/>
              <line x1="20" y1="200" x2="180" y2="200"/>
              <line x1="20" y1="240" x2="180" y2="240"/>
              <line x1="20" y1="280" x2="180" y2="280"/>
              <line x1="20" y1="320" x2="180" y2="320"/>
              <line x1="60" y1="40" x2="60" y2="360"/>
              <line x1="100" y1="40" x2="100" y2="360"/>
              <line x1="140" y1="40" x2="140" y2="360"/>
            </g>
            
            <g>
              <rect class="block-l" x="20" y="320" width="40" height="40"/>
              <rect class="block-o" x="60" y="320" width="40" height="40"/>
              <rect class="block-o" x="100" y="320" width="40" height="40"/>
              <rect class="block-j" x="140" y="320" width="40" height="40"/>
              
              <rect class="block-t" x="20" y="280" width="40" height="40"/>
              <rect class="block-t" x="60" y="280" width="40" height="40"/>
              <rect class="block-t" x="100" y="280" width="40" height="40"/>
              <rect class="block-j" x="140" y="280" width="40" height="40"/>
              
              <rect class="block-s" x="20" y="240" width="40" height="40"/>
              <rect class="block-s" x="60" y="240" width="40" height="40"/>
              <rect class="block-z" x="100" y="240" width="40" height="40"/>
              <rect class="block-z" x="140" y="240" width="40" height="40"/>
              
              <rect class="block-i" x="20" y="200" width="40" height="40"/>
              <rect class="block-i" x="60" y="200" width="40" height="40"/>
              <rect class="block-i" x="100" y="200" width="40" height="40"/>
              <rect class="block-i" x="140" y="200" width="40" height="40"/>
            </g>
            
            <rect class="flash" x="20" y="200" width="160" height="40" style="animation: flash 2s infinite;">
              <animate attributeName="y" values="200;200;240;240;280;280" dur="8s" repeatCount="indefinite"/>
            </rect>
            
            <g style="animation: fall1 3s linear infinite;">
              <rect class="block-i" x="60" y="40" width="40" height="40"/>
              <rect class="block-i" x="60" y="80" width="40" height="40"/>
              <rect class="block-i" x="60" y="120" width="40" height="40"/>
              <rect class="block-i" x="60" y="160" width="40" height="40"/>
            </g>
            
            <g style="animation: fall2 4s linear infinite; animation-delay: 1s;">
              <rect class="block-t" x="60" y="40" width="40" height="40"/>
              <rect class="block-t" x="20" y="80" width="40" height="40"/>
              <rect class="block-t" x="60" y="80" width="40" height="40"/>
              <rect class="block-t" x="100" y="80" width="40" height="40"/>
            </g>
            
            <g style="animation: fall3 3.5s linear infinite; animation-delay: 2s;">
              <rect class="block-z" x="60" y="40" width="40" height="40"/>
              <rect class="block-z" x="100" y="40" width="40" height="40"/>
              <rect class="block-z" x="20" y="80" width="40" height="40"/>
              <rect class="block-z" x="60" y="80" width="40" height="40"/>
            </g>
            
            <g style="animation: fall4 2.5s linear infinite; animation-delay: 0.5s;">
              <rect class="block-o" x="100" y="40" width="40" height="40"/>
              <rect class="block-o" x="140" y="40" width="40" height="40"/>
              <rect class="block-o" x="100" y="80" width="40" height="40"/>
              <rect class="block-o" x="140" y="80" width="40" height="40"/>
            </g>
            
            <rect x="200" y="40" width="80" height="80" fill="#161b22" stroke="#30363d" stroke-width="2" rx="4"/>
            <g transform="translate(220, 60)">
              <rect class="block-s" x="0" y="0" width="20" height="20"/>
              <rect class="block-s" x="20" y="0" width="20" height="20"/>
              <rect class="block-s" x="20" y="20" width="20" height="20"/>
              <rect class="block-s" x="40" y="20" width="20" height="20"/>
            </g>
            
            <text x="200" y="140" class="score">SCORE</text>
            <text x="200" y="160" class="score" fill="#58a6ff">12,800</text>
            
            <text x="200" y="190" class="score">LINES</text>
            <text x="200" y="210" class="score" fill="#3fb950">42</text>
            
            <text x="200" y="240" class="score">LEVEL</text>
            <text x="200" y="260" class="score" fill="#f0883e">5</text>
            
            <rect x="200" y="280" width="80" height="6" fill="#21262d" rx="3"/>
            <rect x="200" y="280" width="60" height="6" fill="#f0883e" rx="3">
              <animate attributeName="width" values="0;60;60;0" dur="8s" repeatCount="indefinite"/>
            </rect>
            
            <text x="150" y="390" class="score" text-anchor="middle" fill="#484f58" font-size="10">←↓→ MOVE | ↑ ROTATE</text>
          </svg>
          EOF

      # 5. Commit and push generated files back to repo
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/
          git diff --cached --quiet || git commit -m "🎮 Auto-update README games"
          git push
